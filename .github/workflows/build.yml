name: Build Debug APK

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clean Gradle wrapper cache
        run: rm -rf ~/.gradle/wrapper/dists/

      - name: Remove corrupted gradle-wrapper.jar
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Download fresh gradle-wrapper.jar
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\([0-9.]*\)-.*/\1/')
          curl -L -o gradle/wrapper/gradle-wrapper.jar "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -p gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar.new || cp gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar.new
          mv gradle/wrapper/gradle-wrapper.jar.new gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
