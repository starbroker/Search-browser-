name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION_NAME" = "${GITHUB_REF}" ]; then
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BrowserApp-debug.apk
          else
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BrowserApp-v${VERSION_NAME}-debug.apk
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Generate SHA-256
        id: shasum
        run: |
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION_NAME" = "${GITHUB_REF}" ]; then
            SHA256=$(sha256sum app/build/outputs/apk/debug/BrowserApp-debug.apk | awk '{ print $1 }')
          else
            SHA256=$(sha256sum app/build/outputs/apk/debug/BrowserApp-v${VERSION_NAME}-debug.apk | awk '{ print $1 }')
          fi
          echo "SHA256: $SHA256" > release-notes.txt
          echo "Added new features and bug fixes." >> release-notes.txt

      - name: Create GitHub Release (Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/BrowserApp-v*-debug.apk
          body_path: release-notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (Latest on Main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: app/build/outputs/apk/debug/BrowserApp-debug.apk
          body_path: release-notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
