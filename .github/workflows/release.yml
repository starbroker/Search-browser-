name: Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android App & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Create build-artifacts directory
        run: mkdir -p build-artifacts

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare Debug APK Release
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="dev"
            fi
            cp "$APK_PATH" "build-artifacts/Search-${VERSION}-debug.apk"
            echo "Debug APK prepared at build-artifacts/Search-${VERSION}-debug.apk"
          else
            echo "Error: Debug APK not found at $APK_PATH"
            exit 1
          fi

      - name: Build Release APK (Signed or Unsigned)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Signing secrets found. Building signed Release APK..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            export KEYSTORE_PATH="$(pwd)/my-upload-key.jks"
            ./gradlew assembleRelease --stacktrace
          else
            echo "Signing secrets not fully configured. Building unsigned Release APK."
            ./gradlew assembleRelease --stacktrace
          fi
          
          # Handle output path differences between signed and unsigned builds
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          
          if [ -f "$SIGNED_APK" ]; then
            RELEASE_APK_PATH="$SIGNED_APK"
          elif [ -f "$UNSIGNED_APK" ]; then
            RELEASE_APK_PATH="$UNSIGNED_APK"
          else
            echo "Error: Release APK built but not found at expected paths"
            exit 1
          fi
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          
          cp "$RELEASE_APK_PATH" "build-artifacts/Search-${VERSION}-release.apk"
          echo "Release APK prepared at build-artifacts/Search-${VERSION}-release.apk"

      - name: Upload APKs as Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Search-APKs
          path: build-artifacts/

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
